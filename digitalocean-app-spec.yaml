# DigitalOcean App Platform — Static Site spec for Granava
# Settings → App Spec → paste/merge. Key items:
#   - catchall_document: index.html  (SPA routing, no 404 on refresh)
#   - cache headers on hashed assets  (fixes "Use efficient cache lifetimes")
name: granava
static_sites:
  - name: granava-web
    git:
      repo_clone_url: https://github.com/YOUR_USERNAME/YOUR_REPO.git
      branch: main
    build_command: npm run build
    output_dir: dist
    index_document: index.html
    catchall_document: index.html
    # Long cache for fingerprinted assets (filenames change when content changes)
    routes:
      - path: /
    # Cache-Control headers
    # Note: DigitalOcean applies these to matching paths.
