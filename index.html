  <script>
    (function () {
      var pl = document.getElementById('granava-preloader');
      if (!pl) return;
      if (document.documentElement.classList.contains('pl-skip')) { pl.parentNode.removeChild(pl); return; }
      var done = false, MIN = 900, t0 = Date.now();
      function finish() {
        if (done) return; done = true;
        try { localStorage.setItem('granava_seen', '1'); } catch (e) {}
        pl.classList.add('pl-done');
        setTimeout(function () { if (pl && pl.parentNode) pl.parentNode.removeChild(pl); }, 600);
      }
      function schedule() { setTimeout(finish, Math.max(0, MIN - (Date.now() - t0))); }
      // Dismiss the moment React signals it has mounted...
      window.__granavaReady = schedule;
      // ...or on full load, whichever comes first...
      window.addEventListener('load', schedule);
      // ...with a hard fallback so it can never get stuck.
      setTimeout(finish, 4500);
    })();
  </script>
